name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  compile-check:
    name: cljs compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache m2 / gitlibs
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.gitlibs
          key: ${{ runner.os }}-clj-cljs-compile-check
          restore-keys: |
            ${{ runner.os }}-clj-

      # No runtime tests -- this is a browser-only WebGPU interop wrapper
      # (navigator.gpu is not available under Node/JVM). The cljs compile
      # itself catches syntax/require/macro-expansion errors.
      - name: Compile-check
        run: |
          clojure -Sdeps '{:deps {org.clojure/clojurescript {:mvn/version "1.11.132"}} :paths ["src"]}' \
            -M -m cljs.main --compile w3.webgpu
